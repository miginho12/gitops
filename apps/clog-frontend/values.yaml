# Clog 프론트엔드 기본 values
# 환경별 override는 values-dev.yaml 에서.

replicaCount: 1

image:
  repository: ghcr.io/miginho12/clog-frontend
  pullPolicy: IfNotPresent
  # tag는 values-dev.yaml 에서 명시 (CI가 SHA로 자동 업데이트)
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podSecurityContext: {}

securityContext:
  # nginx 공식 이미지는 root 마스터로 시작해 캐시 디렉토리를 chown 후
  # worker 를 nginx 유저로 강등. capabilities 를 과하게 drop 하면
  # 마스터의 chown 이 실패하므로 표준 동작을 허용한다.
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

service:
  type: NodePort
  port: 80
  targetPort: 80
  # 백엔드(30080)와 분리
  nodePort: 30081

resources:
  # nginx는 가벼움 (RPi 부담 최소)
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 32Mi

nodeSelector: {}
tolerations: []
affinity: {}
