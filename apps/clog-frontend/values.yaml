# Clog н”„лЎ нҠём—”л“ң кё°ліё values
# нҷҳкІҪлі„ overrideлҠ” values-dev.yaml м—җм„ң.

replicaCount: 1

image:
  repository: ghcr.io/miginho12/clog-frontend
  pullPolicy: IfNotPresent
  # tagлҠ” values-dev.yaml м—җм„ң лӘ…мӢң (CIк°Җ SHAлЎң мһҗлҸҷ м—…лҚ°мқҙнҠё)
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podSecurityContext:
  fsGroup: 101  # nginx-alpineмқҳ nginx к·ёлЈ№

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE  # 80 нҸ¬нҠё л°”мқёл”©
  readOnlyRootFilesystem: false
  runAsNonRoot: false  # nginx кіөмӢқ мқҙлҜём§ҖлҠ” rootлЎң мӢңмһ‘ нӣ„ workerлҘј nginx мң м ҖлЎң

service:
  type: NodePort
  port: 80
  targetPort: 80
  # л°ұм—”л“ң(30080)мҷҖ л¶„лҰ¬
  nodePort: 30081

resources:
  # nginxлҠ” к°ҖлІјмӣҖ (RPi л¶ҖлӢҙ мөңмҶҢ)
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 32Mi

nodeSelector: {}
tolerations: []
affinity: {}
