# prod 환경 override
# 2026-07-16: 백엔드(clog-prod) 준비 완료 후 프론트 prod 배포.
# 수동 승격 원칙 — dev에서 검증된 sha 태그를 그대로 반영 (재빌드 아님).
# 2026-07-17: Tailscale Funnel(https://clog.tail099985.ts.net) 전환 완료 — 이 NodePort(30083)가 공개 대상.
# dev(30081)는 Funnel에서 빠지고 tailnet 내부 전용으로 전환됨.

image:
  tag: "sha-f35af53"  # dev에서 클라이머 브라우즈 + 점수 산정 기준 안내(QA #2/#3) 검증 완료 후 승격
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  # 백엔드(30082)와 dev 프론트(30081)에 안 겹치게
  nodePort: 30083

env:
  CLOG_BACKEND_HOST: "clog-prod"
