# ============================================================
# kube-prometheus-stack
# ============================================================
kube-prometheus-stack:
  # CRD 는 이미 클러스터에 있음 (이전 helm 의 잔여)
  crds:
    enabled: true

  # ────────────────────────────────────────
  # Grafana
  # ────────────────────────────────────────
  grafana:
    adminPassword: admin1234
    service:
      type: NodePort
      nodePort: 30300
    persistence:
      enabled: true
      size: 5Gi
      storageClassName: local-path
    
    # Loki datasource 자동 추가
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://monitoring-loki.monitoring.svc:3100
        access: proxy
        editable: false

  # ────────────────────────────────────────
  # Prometheus (PVC + 15일 retention)
  # ────────────────────────────────────────
  prometheus:
    service:
      type: NodePort
      nodePort: 30090
    prometheusSpec:
      retention: 15d
      retentionSize: "40GB"
      
      # PVC (k3s local-path)
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      
      # ServiceMonitor / PodMonitor 자동 발견 (clog-backend 도)
      serviceMonitorSelectorNilUsesHelmValues: false
      podMonitorSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      
      # 리소스 제한 (라즈베리파이 보호)
      resources:
        requests:
          memory: 800Mi
          cpu: 200m
        limits:
          memory: 1500Mi

  # ────────────────────────────────────────
  # AlertManager 🆕
  # ────────────────────────────────────────
  alertmanager:
    enabled: true
    service:
      type: NodePort
      nodePort: 30903
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
      resources:
        requests:
          memory: 80Mi
        limits:
          memory: 200Mi
    
    # 라우팅 + Discord webhook
    config:
      global:
        resolve_timeout: 5m
      
      route:
        group_by: ['alertname', 'severity']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        receiver: 'discord-infra'  # default fallback
        routes:
          - matchers:
              - alertname=~"Watchdog|InfoInhibitor|KubeProxyDown"
            receiver: 'null'
          - matchers:
              - alertname="KubePodCrashLooping"
              - pod=~"argocd-applicationset-controller.*"
            receiver: 'null'
          - matchers:
              - category="service"
            receiver: 'discord-service'
          - matchers:
              - category="infra"
            receiver: 'discord-infra'
      
      receivers:
        - name: 'null'
        - name: 'discord-infra'
          webhook_configs:
            - url: 'http://alertmanager-discord-infra:9094'
              send_resolved: true
        - name: 'discord-service'
          webhook_configs:
            - url: 'http://alertmanager-discord-service:9094'
              send_resolved: true

  # ────────────────────────────────────────
  # 기본 컴포넌트들
  # ────────────────────────────────────────
  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true
  
  # 기본 K8s 알람 룰 활성 (CrashLoop, OOM, NotReady 등)
  defaultRules:
    create: true
    rules:
      alertmanager: true
      etcd: false        # k3s 는 sqlite 사용
      kubeProxy: true
      kubeSchedulerAlerting: false  # k3s 는 단일 노드
      kubeControllerManager: false


# ============================================================
# Loki (single-binary 모드, k3s + 라즈베리파이 친화)
# ============================================================
loki:
  deploymentMode: SingleBinary
  
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    # 7일 보존
    limits_config:
      retention_period: 168h
      reject_old_samples: true
      reject_old_samples_max_age: 168h
  
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 20Gi
      storageClass: local-path
    resources:
      requests:
        memory: 200Mi
        cpu: 100m
      limits:
        memory: 500Mi
  
  # 분산 모드용 컴포넌트 모두 비활성 (single-binary 라)
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  gateway:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
    lokiCanary:
      enabled: false
    serviceMonitor:
      enabled: true   # Prometheus 가 Loki 자신도 수집
  test:
    enabled: false


# ============================================================
# Promtail (DaemonSet - 모든 노드의 Pod 로그 수집)
# ============================================================
promtail:
  config:
    clients:
      - url: http://monitoring-loki.monitoring.svc:3100/loki/api/v1/push
    
    # Pod 메타데이터 (namespace, pod, container) 자동 첨부
    snippets:
      pipelineStages:
        - cri: {}
  
  resources:
    requests:
      memory: 50Mi
      cpu: 50m
    limits:
      memory: 150Mi
  
  # ServiceMonitor (Promtail 자신도 메트릭 노출)
  serviceMonitor:
    enabled: true
