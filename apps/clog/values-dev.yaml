image:
  tag: "latest"
  pullPolicy: Always

env:
  ENVIRONMENT: dev
  LOG_LEVEL: DEBUG

  # DB
  DB_HOST: postgres.dev.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: clog_dev
  DB_USER: clog
  DB_POOL_SIZE: "5"
  DB_POOL_MAX_OVERFLOW: "5"
  DB_POOL_TIMEOUT: "30"
  DB_ECHO: "false"

  # JWT (Day 11)
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  JWT_ALGORITHM: "RS256"
  JWT_ISSUER: "clog-backend"

  # Redis (Day 11B) ⭐
  REDIS_HOST: redis.dev.svc.cluster.local
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_MAX_CONNECTIONS: "20"
  REDIS_SOCKET_TIMEOUT: "5"
  REDIS_CONNECT_TIMEOUT: "5"

# Secret 참조
secretRefs:
  - name: clog-db-credentials
    keys: [DB_PASSWORD]
  - name: clog-jwt-keys           # JWT private/public 키
    keys: [JWT_PRIVATE_KEY, JWT_PUBLIC_KEY]
  - name: clog-redis-credentials  # ⭐ Day 11B - Redis 비밀번호
    keys: [REDIS_PASSWORD]

resources:
  limits:
    cpu: 300m
    memory: 384Mi
  requests:
    cpu: 50m
    memory: 128Mi
