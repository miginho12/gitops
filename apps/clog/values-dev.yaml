image:
  tag: "sha-c99b57b"
  pullPolicy: IfNotPresent

# ⭐ Day 13 추가: Service 를 NodePort 로 변경
# 라즈베리파이의 30080 포트로 외부 노출, Tailscale Funnel 이 이 포트로 전달
service:
  type: NodePort
  port: 80
  nodePort: 30080

env:
  ENVIRONMENT: dev
  LOG_LEVEL: DEBUG

  # DB
  DB_HOST: postgres.dev.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: clog_dev
  DB_USER: clog
  DB_POOL_SIZE: "5"
  DB_POOL_MAX_OVERFLOW: "5"
  DB_POOL_TIMEOUT: "30"
  DB_ECHO: "false"

  # JWT (Day 11)
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
  JWT_ALGORITHM: "RS256"
  JWT_ISSUER: "clog-backend"

  # Redis (Day 11B)
  REDIS_HOST: redis.dev.svc.cluster.local
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_MAX_CONNECTIONS: "20"
  REDIS_SOCKET_TIMEOUT: "5"
  REDIS_CONNECT_TIMEOUT: "5"

  # ⭐ Day 13 추가: 카카오 OAuth 외부 URL
  # 카카오에 가입/로그인 시 사용자가 돌아오는 URL
  # K8s 환경에선 외부 도메인 사용
  KAKAO_REDIRECT_URI: "https://clog.tail099985.ts.net/api/auth/kakao/callback"
  # 카카오 콜백 후 토큰을 담아 리다이렉트할 프론트 주소
  FRONTEND_URL: "https://clog.tail099985.ts.net"
  # MinIO (미디어 업로드)
  MINIO_ENDPOINT: "minio.dev.svc.cluster.local:9000"
  MINIO_BUCKET: "clog-media"
  MINIO_SECURE: "true"
  # 외부 presigned 호스트 (외부 노출 후 채움 — 비면 endpoint 폴백)
  MINIO_PUBLIC_ENDPOINT: "clog.tail099985.ts.net"

# Secret 참조
secretRefs:
  - name: clog-db-credentials
    keys: [DB_PASSWORD]
  - name: clog-jwt-keys
    keys: [JWT_PRIVATE_KEY, JWT_PUBLIC_KEY]
  - name: clog-redis-credentials
    keys: [REDIS_PASSWORD]
  # ⭐ Day 13: 카카오 OAuth 자격증명
  - name: clog-kakao-credentials
    keys: [KAKAO_CLIENT_ID, KAKAO_CLIENT_SECRET]
  # MinIO 자격증명 (백엔드 presigned 발급용)
  - name: minio-credentials
    keys: [MINIO_ACCESS_KEY, MINIO_SECRET_KEY]
  # 이메일 인증 SMTP (Gmail)
  - name: clog-smtp-credentials
    keys: [SMTP_USER, SMTP_PASSWORD]

resources:
  limits:
    cpu: 300m
    memory: 384Mi
  requests:
    cpu: 50m
    memory: 128Mi

# 영상 트랜스코딩 워커 (ARQ) — API 와 같은 이미지, command=arq
worker:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: "2"
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

serviceMonitor:
  enabled: true

# 미디어 orphan 청소 CronJob (MinIO)
mediaReconcile:
  enabled: true
  # 처음엔 dry-run(false)로 검증 → 확인 후 true 로 전환
  apply: true
  schedule: "0 18 * * *"   # UTC 18:00 = KST 03:00 매일
  timeZone: "Etc/UTC"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
