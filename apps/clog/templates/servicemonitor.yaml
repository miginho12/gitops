{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "clog.fullname" . }}
  labels:
    {{- include "clog.labels" . | nindent 4 }}
    release: monitoring  # kube-prometheus-stack 의 selector
spec:
  selector:
    matchLabels:
      {{- include "clog.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http        # service.yaml 의 port name
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      # ⭐ app label 자동 주입 (PrometheusRule 에서 사용)
      relabelings:
        - sourceLabels: [__address__]
          targetLabel: app
          replacement: clog-backend
{{- end }}
