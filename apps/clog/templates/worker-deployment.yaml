{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clog.fullname" . }}-worker
  labels:
    {{- include "clog.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  # 워커는 max_jobs=1 이라 1 replica 로 충분 (라파이 부담 제한)
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "clog.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      annotations:
        {{- if .Values.configMap.enabled }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "clog.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clog.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}-worker
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # API 대신 ARQ 워커 실행 (같은 이미지, command 오버라이드)
          command: ["arq", "app.worker.WorkerSettings"]
          envFrom:
            {{- if .Values.configMap.enabled }}
            - configMapRef:
                name: {{ include "clog.fullname" . }}
            {{- end }}
            {{- range .Values.secretRefs }}
            - secretRef:
                name: {{ .name }}
            {{- end }}
          # readOnlyRootFilesystem(prod)에서도 ffmpeg 트랜스코딩용 스크래치 공간이
          # 필요 — tempfile.TemporaryDirectory()가 /tmp에 쓰기 시도하는데 루트FS가
          # 읽기전용이면 디렉터리 자체가 없어 FileNotFoundError로 즉시 크래시한다
          # (2026-07-19 prod에서 영상 업로드 후 피드 미노출로 발견 — media_status가
          # processing에 멈춘 채 트랜스코딩 실패 알림도 못 감).
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
