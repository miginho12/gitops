# Bitnami PostgreSQL chart override
# 원본 values: https://github.com/bitnami/charts/blob/main/bitnami/postgresql/values.yaml
#
# postgresql: 키 아래의 모든 설정이 Bitnami chart로 전달됨
postgresql:
  # ─── 기본 정보 ─────────────────────────────────
  fullnameOverride: postgres
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: 16.4.0-debian-12-r10   # PostgreSQL 16.4 확정

  # ─── 인증 (Secret 으로 분리) ────────────────────
  # 보안: 실제 비밀번호는 K8s Secret 으로 별도 생성
  auth:
    existingSecret: postgres-credentials  # 우리가 수동 생성할 Secret 이름
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: clog-password
      replicationPasswordKey: replication-password  # 사용 안 하지만 필수 키
    
    # 클로그 전용 사용자 + DB 자동 생성
    username: clog          # 앱 사용 계정 (postgres가 아님)
    database: clog_dev      # dev 환경 DB
    enablePostgresUser: true  # postgres superuser 도 활성화 (관리용)

  # ─── 단일 인스턴스 (HA 없음) ────────────────────
  architecture: standalone  # primary-only (replica 없음)

  # ─── 자원 (RPi 환경 보수적) ─────────────────────
  primary:
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

    # ─── 영구 저장소 (PVC) ───────────────────────
    persistence:
      enabled: true
      storageClass: ""    # 빈 문자열 = 기본 storageclass 사용 (local-path)
      size: 4Gi           # RPi 디스크 고려 (필요시 확장)
      accessModes:
        - ReadWriteOnce

    # ─── 라이브 / 레디 체크 ──────────────────────
    # Bitnami 기본값이 적절하므로 따로 override 안 함
    
    # ─── PostgreSQL 자체 튜닝 ────────────────────
    # 적은 자원에 맞춰 설정 (default 는 vm 환경 가정으로 큼)
    extendedConfiguration: |
      max_connections = 50
      shared_buffers = 64MB
      effective_cache_size = 192MB
      maintenance_work_mem = 16MB
      work_mem = 2MB

  # ─── Service ────────────────────────────────────
  service:
    type: ClusterIP    # 클러스터 내부만 (clog-backend 가 같은 클러스터)
    ports:
      postgresql: 5432

  # ─── 메트릭 (Prometheus exporter) ───────────────
  # 진호님 Prometheus 가 있다면 활성화. 지금은 일단 비활성.
  metrics:
    enabled: false

  # ─── 백업 (지금은 비활성, 추후 CronJob 으로) ───
  # 운영 환경에서는 별도 CronJob 으로 pg_dump 스케줄링 권장
