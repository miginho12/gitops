# PostgreSQL 커스텀 chart values

# 이미지 (multi-arch 확정: amd64 + arm64)
image:
  repository: postgres
  tag: "16-alpine"          # alpine = 가벼움 (~80MB), arm64 지원
  pullPolicy: IfNotPresent

# 단일 인스턴스 (단일 노드 환경)
replicaCount: 1

# 데이터베이스 초기 설정
database:
  name: clog_dev            # 자동 생성될 DB
  user: clog                # 자동 생성될 사용자

# Secret 참조 (kubectl 로 직접 생성한 거)
secret:
  name: postgres-credentials
  keys:
    postgresPassword: postgres-password    # postgres superuser 비번
    userPassword: clog-password            # clog 사용자 비번

# 저장소
persistence:
  enabled: true
  storageClass: ""           # 기본 (local-path)
  size: 4Gi
  accessMode: ReadWriteOnce

# 자원 (RPi 환경)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# 서비스
service:
  type: ClusterIP
  port: 5432

# PostgreSQL 튜닝 (RPi 자원 고려)
postgresql:
  maxConnections: 50
  sharedBuffers: 64MB
  effectiveCacheSize: 192MB
  maintenanceWorkMem: 16MB
  workMem: 2MB
  walLevel: replica
  
# Pod 보안
podSecurityContext:
  fsGroup: 999              # postgres 공식 이미지의 postgres user GID

securityContext:
  runAsUser: 999            # postgres user UID
  runAsGroup: 999
  runAsNonRoot: true
