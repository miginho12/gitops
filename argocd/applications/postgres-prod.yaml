apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/miginho12/gitops
    targetRevision: main
    path: apps/postgres
    helm:
      releaseName: postgres-prod
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  # dev와 마찬가지로 자동 sync (DB 자체는 postgres-dev 패턴을 그대로 재사용)
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
